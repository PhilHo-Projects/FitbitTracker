name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fitbit_integration
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fitbit_integration"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          PG_INTEGRATION_URL: postgresql://postgres:postgres@localhost:5432/fitbit_integration
      - run: npm run build
      - name: Verify generated n8n workflow
        run: |
          npm run build:workflow
          git diff --exit-code -- n8n/health-hub-workflow.json
      - run: docker build -t fitbit-tracker:${{ github.sha }} .
